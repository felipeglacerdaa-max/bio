<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isaque Santos| Bio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero-card">
      <div class="cover-wrapper" id="coverWrapper" aria-label="Capa do perfil">
        <div class="cover-overlay"></div>
        <button class="image-button cover-button" id="coverButton" type="button">Trocar capa</button>
        <input type="file" id="coverInput" accept="image/*" hidden />
      </div>

      <div class="profile-group">
        <div class="avatar-frame">
          <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=400&q=80" alt="Foto de perfil" class="avatar" id="avatarImage" />
          <button class="image-button avatar-button" type="button" id="avatarButton">Trocar foto</button>
          <input type="file" id="avatarInput" accept="image/*" hidden />
        </div>

        <div class="text-block">
          <h1>Isaque Santos</h1>
          <p>Salão de beleza Feminino</p>
          <div class="socials">
            <span>Instagram</span>
            <span>WhatsApp</span>
            <span>Localização</span>
          </div>
        </div>
      </div>

      <div class="links-panel">
        <a class="link-card" href="#" aria-label="Instagram">
          <span class="icon">📱</span>
          Instagram
        </a>
        <a class="link-card" href="#" aria-label="Agendar horário">
          <span class="icon">📅</span>
          Quero agendar um horário
        </a>
        <a class="link-card" href="#" aria-label="Localização">
          <span class="icon">📍</span>
          Localização
        </a>
      </div>

      <button class="action-button" type="button">Criar um bio site profissional</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
